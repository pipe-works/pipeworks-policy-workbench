repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
    args: [--markdown-linebreak-ext=md]
  - id: end-of-file-fixer
  - id: mixed-line-ending
    args: [--fix=lf]
  - id: check-yaml
  - id: check-toml
  - id: check-json
  - id: check-added-large-files
    args: [--maxkb=500]
  - id: check-merge-conflict
  - id: check-ast

- repo: https://github.com/psf/black
  rev: 26.1.0
  hooks:
  - id: black
    language_version: python3.13
    args: [--line-length, '100']

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.10
  hooks:
  - id: ruff
    args: [--fix, --exit-non-zero-on-fix]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
  - id: mypy
    args: [--ignore-missing-imports, --check-untyped-defs, --no-site-packages]
    files: ^src/

- repo: https://github.com/codespell-project/codespell
  rev: v2.3.0
  hooks:
  - id: codespell
    args:
    - --ignore-words-list=nd,ND,hel,tha,zar,ba,ka,lo,te,ro,na,ra,zel,der
    - --skip="*.pyc,*.git,*.egg-info,htmlcov,.pytest_cache,__pycache__"

- repo: local
  hooks:
  - id: pytest-check
    name: pytest (unit)
    entry: pytest
    args: [tests/unit, --tb=short, -q, --maxfail=3, -x]
    language: system
    pass_filenames: false
    types: [python]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: monthly
