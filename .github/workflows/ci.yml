name: CI

on:
  push:
    branches: [main, develop, release-please--*]
  pull_request:
    branches: [main, develop]
  schedule:
  - cron: 17 5 * * 1      # Weekly Monday full sweep (UTC)
  workflow_dispatch:  # Allow manual triggering
  workflow_call:  # Allow being called by other workflows

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    uses: pipe-works/.github/.github/workflows/reusable-python-ci.yml@main
    with:
      python-version: '3.12'
      python-versions: '["3.12", "3.13"]'
      coverage-threshold: 80
      run-security: true
      run-docs: false
      run-gitleaks: true
      requires-models: false
      coverage-on-matrix: false
      pytest-matrix-markers: not slow and not requires_model
      pytest-matrix-args: --override-ini addopts=
      pytest-coverage-markers: not slow and not requires_model
      pytest-coverage-args: --override-ini addopts=
      run-supplemental-tests: false
    secrets: inherit
